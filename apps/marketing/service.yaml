apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: permitwatchdog-marketing
  labels:
    cloud.googleapis.com/location: europe-west3
spec:
  template:
    spec:
      containers:
      - image: gcr.io/PROJECT_ID/permitwatchdog-marketing
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_STRIPE_PAYMENT_LINK
          value: "https://buy.stripe.com/test"
        resources:
          limits:
            memory: 512Mi
            cpu: 1000m
